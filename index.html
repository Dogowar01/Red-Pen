<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#020817"/>
  <meta name="description" content="Fiction editorial analysis suite"/>
  <title>The Red Pen</title>
  <link rel="manifest" href="./manifest.json"/>
  <link rel="apple-touch-icon" href="./icon-192.png"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#020817;color:#e2e8f0;font-family:Georgia,serif;}
    #root{min-height:100vh;}
    .loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:1rem;}
    .loading-title{font-family:Georgia,serif;font-size:2rem;color:#f1f5f9;font-weight:700;}
    .loading-sub{font-family:'Courier New',monospace;font-size:0.7rem;color:#475569;letter-spacing:0.15em;}

    .loading-dot:nth-child(2){animation-delay:0.2s;}
    .loading-dot:nth-child(3){animation-delay:0.4s;}

  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      <div class="loading-title">The Red Pen</div>
      <div style="display:flex;gap:4px">
        <span class="loading-dot" style="font-family:'Courier New',monospace;color:#334155">◆</span>
        <span class="loading-dot" style="font-family:'Courier New',monospace;color:#334155">◆</span>
        <span class="loading-dot" style="font-family:'Courier New',monospace;color:#334155">◆</span>
      </div>
      <div class="loading-sub">Loading editorial suite...</div>
    </div>
  </div>

  <!-- React + Babel (no build step needed) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
// ─── API KEY MANAGEMENT ───────────────────────────────────────────────────────

const KEY_STORE = 'red-pen-api-key';
function getKey() { return localStorage.getItem(KEY_STORE) || ''; }
function saveKey(k) { localStorage.setItem(KEY_STORE, k.trim()); }

// ─── CONSTANTS ────────────────────────────────────────────────────────────────

const STOP = new Set(["the","a","an","and","or","but","if","then","is","are","was","were","be","been","being","have","has","had","do","does","did","will","would","could","should","may","might","must","of","to","in","on","at","by","for","with","about","against","between","through","during","before","after","above","below","from","up","down","out","off","over","under","again","further","once","here","there","when","where","why","how","all","each","every","both","few","more","most","other","some","such","no","not","only","own","same","so","than","too","very","s","t","can","just","this","that","these","those","i","me","my","you","your","he","him","his","she","her","it","its","we","us","our","they","them","their","what","which","who","whom","as","into","like","one","also","any","because","now","said","says","say"]);
const CRUTCH = {"suddenly":"vague time marker — show the abruptness","just":"filler intensifier — usually deletable","really":"weak intensifier — find a stronger word","very":"weak intensifier — find a stronger word","quite":"weak hedge — usually deletable","actually":"filler — usually deletable","began":"filtering verb — show the action directly","started":"filtering verb — show the action directly","felt":"emotion-tell — show the feeling","seemed":"uncertainty hedge — be direct","appeared":"uncertainty hedge — be direct","noticed":"POV filter — drop it, show the thing","realized":"telling — show the realisation unfold","watched":"POV filter — usually deletable","heard":"POV filter — usually deletable","thought":"internal filter — go direct to the thought","wondered":"internal filter — go direct to the question","somehow":"vague — explain or cut","somewhat":"weak hedge — cut","nodded":"overused gesture","shrugged":"overused gesture","sighed":"overused gesture","smiled":"overused gesture","frowned":"overused gesture","literally":"filler","basically":"filler"};
const TYPE_COLORS = {"Throat-clearing":"#ef4444","Adverb stuffing":"#f97316","Emotion-telling":"#a855f7","Hollow intensifiers":"#f59e0b","Passive constructions":"#3b82f6","Redundant body language":"#06b6d4","Over-explaining":"#84cc16","AI filler phrases":"#ec4899","Repetitive sentence rhythm":"#8b5cf6","Stage directions":"#14b8a6","Sycophantic cadence":"#fb7185","Sterile metaphors":"#f472b6"};
function typeColor(t){for(const[k,v]of Object.entries(TYPE_COLORS))if(t.toLowerCase().includes(k.toLowerCase()))return v;return"#94a3b8";}

// ─── TEXT UTILS ───────────────────────────────────────────────────────────────

const countWords=t=>t.trim()?t.trim().split(/\s+/).length:0;
function splitSentences(t){const c=t.replace(/\b(Mr|Mrs|Ms|Dr|Jr|Sr|St|Lt|Sgt|Prof|vs|etc|e\.g|i\.e)\./gi,"$1<D>");return(c.match(/[^.!?]+[.!?]+["']?/g)||[]).map(s=>s.replace(/<D>/g,".").trim()).filter(s=>s.length>0);}
const tokenize=t=>(t.toLowerCase().match(/\b[a-z'']+\b/g)||[]);

// ─── LOCAL ANALYSES ───────────────────────────────────────────────────────────

function computePacing(text,wc){
  if(wc<50)return null;
  const sents=splitSentences(text),lens=sents.map(s=>s.split(/\s+/).filter(Boolean).length);
  if(!lens.length)return null;
  const avg=lens.reduce((a,b)=>a+b,0)/lens.length,stdDev=Math.sqrt(lens.reduce((a,b)=>a+(b-avg)**2,0)/lens.length),burstiness=stdDev/avg;
  const runs=[];let cur=[0];
  for(let i=1;i<lens.length;i++){if(Math.abs(lens[i]-lens[i-1])<=2)cur.push(i);else{if(cur.length>=4)runs.push([...cur]);cur=[i];}}
  if(cur.length>=4)runs.push(cur);
  const starterFreq={},starterSents=[];
  sents.forEach((s,idx)=>{const clean=s.replace(/^["'\u201C\u2018\s]+/,''),first=(clean.match(/^([A-Za-z]+)/)||[])[1];if(!first)return;const w=first.toLowerCase();starterFreq[w]=(starterFreq[w]||0)+1;starterSents.push({idx,word:w});});
  const total=starterSents.length||1;
  const overused=Object.entries(starterFreq).filter(([,c])=>c>=4||(c/total)>=0.15).sort((a,b)=>b[1]-a[1]).map(([w,c])=>({word:w,count:c,pct:Math.round((c/total)*100)}));
  const consecRuns=[];let cRun=starterSents[0]?[starterSents[0]]:[];
  for(let i=1;i<starterSents.length;i++){if(starterSents[i].word===starterSents[i-1].word)cRun.push(starterSents[i]);else{if(cRun.length>=3)consecRuns.push([...cRun]);cRun=[starterSents[i]];}}
  if(cRun.length>=3)consecRuns.push(cRun);
  const topStarters=Object.entries(starterFreq).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([w,c])=>({word:w,count:c,pct:Math.round((c/total)*100)}));
  return{lens,avg,stdDev,burstiness,max:Math.max(...lens),min:Math.min(...lens),runs,total:sents.length,starters:{overused,consecRuns,topStarters,totalSents:total}};
}

function computeRepeats(text,wc){
  if(wc<50)return null;
  const words=tokenize(text),freq={};
  for(const w of words)if(!STOP.has(w)&&w.length>2)freq[w]=(freq[w]||0)+1;
  const repeated=Object.entries(freq).filter(([,c])=>c>=3).sort((a,b)=>b[1]-a[1]).slice(0,20);
  const crutchHits=Object.entries(CRUTCH).map(([word,reason])=>{const c=words.filter(w=>w===word).length;return c>=2?{word,count:c,reason,per1000:((c/words.length)*1000).toFixed(1)}:null;}).filter(Boolean).sort((a,b)=>b.count-a.count);
  const echoes=[],seen=new Set();
  for(let i=0;i<words.length;i++){if(STOP.has(words[i])||words[i].length<=3)continue;for(let j=i+1;j<Math.min(i+30,words.length);j++){if(words[i]===words[j]){const k=`${words[i]}-${i}`;if(!seen.has(k)){echoes.push({word:words[i],distance:j-i});seen.add(k);}break;}}}
  return{repeated,crutchHits,echoes:echoes.slice(0,15),totalWords:words.length};
}

function computeDialogueMeta(text,wc){
  if(wc<50)return null;
  const m=text.match(/[\u201C\u201D"][^\u201C\u201D"]{3,}[\u201C\u201D"]/g)||text.match(/"[^"]{3,}"/g)||[];
  const dialogueWords=m.join(' ').split(/\s+/).filter(Boolean).length;
  return{ratio:Math.round((dialogueWords/wc)*100),lineCount:m.length,dialogueWords,proseWords:wc-dialogueWords};
}

// ─── JSZip + IMPORT/EXPORT ────────────────────────────────────────────────────

function loadJSZip(){
  return new Promise((res,rej)=>{
    if(window.JSZip)return res(window.JSZip);
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    s.onload=()=>res(window.JSZip);s.onerror=rej;
    document.head.appendChild(s);
  });
}

async function importDocx(file){
  const JSZip=await loadJSZip(),zip=await JSZip.loadAsync(file),xmlFile=zip.file('word/document.xml');
  if(!xmlFile)throw new Error('Could not find document content. Is this a valid .docx file?');
  const xml=await xmlFile.async('string'),parser=new DOMParser(),doc=parser.parseFromString(xml,'application/xml');
  const NS='http://schemas.openxmlformats.org/wordprocessingml/2006/main',paragraphs=doc.getElementsByTagNameNS(NS,'p'),lines=[];
  for(const para of paragraphs){let line='';const runs=para.getElementsByTagNameNS(NS,'r');for(const run of runs){if(run.parentElement?.localName==='del')continue;const ts=run.getElementsByTagNameNS(NS,'t');for(const t of ts)line+=t.textContent;if(run.getElementsByTagNameNS(NS,'br').length)line+='\n';}lines.push(line);}
  return lines.join('\n').replace(/\n{3,}/g,'\n\n').trim();
}

const xe=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function xrun(text,p={}){const{b,i,color,sz}=p,rpr=[b?'<w:b/><w:bCs/>':'',i?'<w:i/>':'',color?`<w:color w:val="${color}"/>`:'',sz?`<w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/>`:''].filter(Boolean).join('');return`<w:r>${rpr?`<w:rPr>${rpr}</w:rPr>`:''}<w:t xml:space="preserve">${xe(text)}</w:t></w:r>`;}
function xpara(runs,style='Normal',before=0,after=160){const sp=(before||after!==160)?`<w:spacing${before?` w:before="${before}"`:''} w:after="${after}"/>`:'';;return`<w:p><w:pPr><w:pStyle w:val="${style}"/>${sp}</w:pPr>${Array.isArray(runs)?runs.join(''):runs}</w:p>`;}
const xh1=t=>xpara(xrun(t),'Heading1',480,160),xh2=t=>xpara(xrun(t),'Heading2',280,120),xp=(t,p={})=>xpara(xrun(t,p),'Normal',0,p.after!==undefined?p.after:120),xbr=()=>'<w:p><w:pPr><w:spacing w:after="80"/></w:pPr></w:p>',xhr=()=>'<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="6" w:space="1" w:color="DDDDDD"/></w:pBdr><w:spacing w:before="120" w:after="200"/></w:pPr></w:p>';

function buildDocumentXml({wordCount,aiisms,pacing,repeats,showTell,dialogue,tension,sourceName}){
  const date=new Date().toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'}),ps=[];
  ps.push(xpara(xrun('The Red Pen',{b:true}),'Heading1',0,80));
  ps.push(xpara(xrun('Editorial Analysis Report',{sz:28,color:'555555'}),'Normal',0,60));
  ps.push(xpara(xrun(`${date}  ·  ${wordCount.toLocaleString()} words${sourceName?`  ·  ${sourceName}`:''}`,{sz:20,color:'999999'}),'Normal',0,280));
  ps.push(xhr());
  if(aiisms){
    ps.push(xh1('AI-isms Analysis'));
    const sc=aiisms.score,scC=sc>=6?'16A34A':sc>=4?'D97706':'DC2626',scL=sc>=8?'Strong Human Voice':sc>=6?'Mostly Human':sc>=4?'Needs Work':'Heavy AI Patterns';
    ps.push(xpara([xrun('Humanity Score  ',{b:true}),xrun(`${sc}/10`,{b:true,sz:28,color:scC}),xrun(`   ${scL}`,{color:'666666'})],'Normal',0,120));
    ps.push(xpara(xrun(aiisms.summary,{i:true,color:'444444'}),'Normal',0,240));
    if(aiisms.flags?.length){ps.push(xh2(`${aiisms.flags.length} Flags`));aiisms.flags.forEach((f,i)=>{ps.push(xpara([xrun(`#${String(i+1).padStart(2,'0')}  `,{color:'AAAAAA',sz:20}),xrun(f.type,{b:true,color:'9B2335'})],'Normal',i===0?0:200,40));ps.push(xpara(xrun(`"${f.original}"`,{i:true,color:'555555'}),'Normal',0,60));ps.push(xpara([xrun('Why: ',{b:true,color:'444444'}),xrun(f.reason,{color:'555555'})],'Normal',0,60));ps.push(xpara([xrun('Rewrite: ',{b:true,color:'166534'}),xrun(`"${f.suggestion}"`,{i:true,color:'15803D'})],'Normal',0,100));});}
    ps.push(xhr());
  }
  if(pacing){
    ps.push(xh1('Pacing & Sentence Starters'));
    const rl=pacing.burstiness<0.35?'Monotonous':pacing.burstiness<0.55?'Steady':pacing.burstiness<0.85?'Varied':'Highly Varied',rc=pacing.burstiness<0.35?'DC2626':pacing.burstiness<0.55?'D97706':'16A34A';
    ps.push(xpara([xrun('Rhythm: ',{b:true}),xrun(rl,{b:true,color:rc}),xrun(`   Avg ${pacing.avg.toFixed(1)} words  ·  Range ${pacing.min}–${pacing.max}`,{color:'777777'})],'Normal',0,120));
    if(pacing.burstiness<0.35)ps.push(xp('Sentence lengths are too uniform — vary structure deliberately.',{color:'444444'}));
    if(pacing.runs?.length)ps.push(xp(`${pacing.runs.length} monotony run${pacing.runs.length>1?'s':''} detected (4+ similar-length sentences in a row).`,{color:'444444'}));
    if(pacing.starters?.overused?.length){ps.push(xh2('Overused Sentence Openers'));pacing.starters.overused.forEach(s=>ps.push(xpara([xrun(`${s.word}`,{b:true,color:'92400E'}),xrun(`  ×${s.count}  (${s.pct}%)`,{})],'Normal',0,60)));}
    if(pacing.starters?.consecRuns?.length){ps.push(xh2('Consecutive Same-Opener Runs'));pacing.starters.consecRuns.forEach(run=>ps.push(xpara([xrun(`"${run[0].word}"  `,{b:true,color:'DC2626'}),xrun(`${run.length} in a row`,{color:'777777'})],'Normal',0,60)));}
    ps.push(xhr());
  }
  if(repeats){
    ps.push(xh1('Word Usage & Repeats'));
    ps.push(xh2(`Crutch Words  (${repeats.crutchHits.length} flagged)`));
    if(!repeats.crutchHits.length)ps.push(xp('No overused crutch words.',{color:'16A34A'}));
    else repeats.crutchHits.forEach(h=>ps.push(xpara([xrun(`${h.word}`,{b:true,color:'92400E'}),xrun(`  ×${h.count}  (${h.per1000}/1k)   —   ${h.reason}`,{color:'555555'})],'Normal',0,80)));
    ps.push(xbr());ps.push(xh2(`Echoes  (${repeats.echoes.length})`));
    if(!repeats.echoes.length)ps.push(xp('No close-proximity repetitions.',{color:'16A34A'}));
    else ps.push(xp(repeats.echoes.map(e=>`${e.word} (${e.distance}w)`).join('   ·   '),{color:'0E7490'}));
    if(repeats.repeated?.length){ps.push(xbr());ps.push(xh2('Most Repeated Words'));ps.push(xp(repeats.repeated.map(([w,c])=>`${w} ×${c}`).join('   ·   '),{color:'6D28D9'}));}
    ps.push(xhr());
  }
  if(showTell){
    ps.push(xh1('Show vs Tell'));
    const rc=showTell.ratio>=70?'16A34A':showTell.ratio>=50?'D97706':'DC2626',rl=showTell.ratio>=75?'Strongly Shown':showTell.ratio>=60?'Mostly Shown':showTell.ratio>=45?'Balanced':'Too Much Telling';
    ps.push(xpara([xrun(`${showTell.ratio}%`,{b:true,sz:28,color:rc}),xrun(' shown',{b:true,color:rc}),xrun(`   ${rl}`,{color:'777777'})],'Normal',0,120));
    ps.push(xpara(xrun(showTell.summary,{i:true,color:'444444'}),'Normal',0,240));
    if(showTell.tellingExamples?.length){ps.push(xh2('Convert to Showing'));showTell.tellingExamples.forEach(e=>{ps.push(xpara(xrun(`"${e.text}"`,{i:true,color:'991B1B'}),'Normal',160,40));ps.push(xpara([xrun('Issue: ',{b:true}),xrun(e.issue,{color:'555555'})],'Normal',0,60));ps.push(xpara([xrun('Rewrite: ',{b:true,color:'166534'}),xrun(`"${e.rewrite}"`,{i:true,color:'15803D'})],'Normal',0,140));});}
    ps.push(xhr());
  }
  if(dialogue){
    ps.push(xh1('Dialogue Health'));
    ps.push(xpara([xrun(`${dialogue.dialogueRatio}%`,{b:true,sz:28,color:'3B82F6'}),xrun(' dialogue',{b:true,color:'3B82F6'}),xrun(`   ${dialogue.lineCount} exchanges  ·  ${dialogue.proseDialogueBalance}`,{color:'777777'})],'Normal',0,120));
    ps.push(xpara(xrun(dialogue.summary,{i:true,color:'444444'}),'Normal',0,240));
    if(dialogue.flags?.length){ps.push(xh2(`${dialogue.flags.length} Flags`));dialogue.flags.forEach((f,i)=>{ps.push(xpara([xrun(`#${String(i+1).padStart(2,'0')}  `,{color:'AAAAAA',sz:20}),xrun(f.type,{b:true,color:'1D4ED8'})],'Normal',i===0?0:200,40));ps.push(xpara(xrun(`"${f.original}"`,{i:true,color:'555555'}),'Normal',0,60));ps.push(xpara([xrun('Issue: ',{b:true}),xrun(f.reason,{color:'555555'})],'Normal',0,60));ps.push(xpara([xrun('Rewrite: ',{b:true,color:'166534'}),xrun(`"${f.suggestion}"`,{i:true,color:'15803D'})],'Normal',0,100));});}
    if(dialogue.strengths?.length){ps.push(xh2("What's Working"));dialogue.strengths.forEach(s=>ps.push(xpara([xrun('✓  ',{color:'166534'}),xrun(s,{color:'444444'})],'Normal',0,80)));}
    ps.push(xhr());
  }
  if(tension){
    ps.push(xh1('Tension & Stakes'));
    const tc=tension.tensionScore>=7?'16A34A':tension.tensionScore>=5?'D97706':'DC2626';
    ps.push(xpara([xrun(`${tension.tensionScore}/10`,{b:true,sz:28,color:tc}),xrun('  Tension Score',{b:true,color:tc}),xrun(`   Arc: ${tension.arc}`,{color:'777777'})],'Normal',0,120));
    ps.push(xpara(xrun(tension.summary,{i:true,color:'444444'}),'Normal',0,200));
    if(tension.hook){ps.push(xh2('Hook'));ps.push(xp(tension.hook,{color:'444444'}));}
    if(tension.sagPoints?.length){ps.push(xh2('Where Tension Sags'));tension.sagPoints.forEach(s=>ps.push(xpara([xrun('⚠  ',{color:'D97706'}),xrun(s,{color:'555555'})],'Normal',0,80)));}
    if(tension.ending){ps.push(xh2('Chapter Ending'));ps.push(xp(tension.ending,{color:'444444'}));}
    if(tension.recommendations?.length){ps.push(xh2('Recommendations'));tension.recommendations.forEach(r=>ps.push(xpara([xrun('→  ',{color:'3B82F6'}),xrun(r,{color:'444444'})],'Normal',0,80)));}
  }

  return`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>${ps.join('')}${sectPr}</w:body></w:document>`;
}

function buildStylesXml(){return`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:docDefaults><w:rPrDefault><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial" w:cs="Arial"/><w:sz w:val="24"/><w:szCs w:val="24"/></w:rPr></w:rPrDefault></w:docDefaults><w:style w:type="paragraph" w:default="1" w:styleId="Normal"><w:name w:val="Normal"/><w:pPr><w:spacing w:after="120"/></w:pPr><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="24"/></w:rPr></w:style><w:style w:type="paragraph" w:styleId="Heading1"><w:name w:val="heading 1"/><w:basedOn w:val="Normal"/><w:pPr><w:spacing w:before="480" w:after="160"/><w:outlineLvl w:val="0"/></w:pPr><w:rPr><w:rFonts w:ascii="Georgia" w:hAnsi="Georgia"/><w:b/><w:sz w:val="40"/><w:color w:val="1E293B"/></w:rPr></w:style><w:style w:type="paragraph" w:styleId="Heading2"><w:name w:val="heading 2"/><w:basedOn w:val="Normal"/><w:pPr><w:spacing w:before="280" w:after="120"/><w:outlineLvl w:val="1"/></w:pPr><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:b/><w:sz w:val="28"/><w:color w:val="7C3AED"/></w:rPr></w:style></w:styles>`;}

async function exportDocx(data){
  const JSZip=await loadJSZip(),zip=new JSZip();

  zip.file('word/_rels/document.xml.rels',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>`);
  zip.file('word/document.xml',buildDocumentXml(data));zip.file('word/styles.xml',buildStylesXml());
  const blob=await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  const slug=data.sourceName?data.sourceName.replace(/[^a-z0-9]/gi,'-').toLowerCase():'analysis';
  a.href=url;a.download=`red-pen-${slug}-${new Date().toISOString().slice(0,10)}.docx`;

async function apiCall(system,userContent,maxTokens=4000){
  const key=getKey();
  if(!key)throw new Error('NO_KEY');
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:maxTokens,system,messages:[{role:"user",content:userContent}]})});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return JSON.parse(d.content.map(b=>b.text||"").join("").replace(/```json|```/g,"").trim());
}

const ST_SYS=`Analyse fiction for show-vs-tell balance. Return ONLY valid JSON: {"showCount":<int>,"tellCount":<int>,"ratio":<0-100>,"summary":"2-3 sentences","tellingExamples":[{"text":"<exact>","issue":"<what>","rewrite":"<show it>"}],"showingExamples":[{"text":"<exact>","strength":"<what works>"}]}. Max 6 telling, 3 showing.`;

const TENSION_SYS=`Structural fiction editor assessing tension, stakes, and narrative drive. Return ONLY valid JSON: {"tensionScore":<1-10>,"arc":"<Rising|Falling|Plateau|Peak-Valley|Flat|Strong Build>","summary":"2-3 sentences","hook":"<opening assessment>","hookStrength":<1-10>,"sagPoints":["<specific moment>"],"stakesAssessment":"<assessment>","ending":"<closing assessment>","endingStrength":<1-10>,"recommendations":["<actionable suggestion>"]}. Max 4 sag points, 4 recommendations.`;

function TensionTab({text,wordCount,result,setResult,onNoKey}){
  const[loading,setLoading]=React.useState(false),[error,setError]=React.useState(null);
  async function run(){setLoading(true);setError(null);setResult(null);try{setResult(await apiCall(TENSION_SYS,`Assess tension:\n\n${text}`,3000));}catch(e){if(e.message==='NO_KEY')onNoKey();else setError(e.message);}setLoading(false);}
  if(wordCount<100)return<Empty msg="Paste at least 100 words for tension analysis"/>;

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0.5rem",marginBottom:"1rem"}}>
      {[["Tension",`${result.tensionScore}/10`,tc],["Arc",`${ARC[result.arc]||"~"} ${result.arc}`,"#8b5cf6"],["Hook",`${result.hookStrength}/10`,result.hookStrength>=7?"#4ade80":result.hookStrength>=5?"#facc15":"#ef4444"]].map(([l,v,c])=>
        <div key={l} style={{...S.card,padding:"0.75rem",textAlign:"center"}}><div style={{fontFamily:"Georgia,serif",fontSize:"1.2rem",color:c,fontWeight:700}}>{v}</div><div style={{...S.mono,fontSize:"0.55rem",color:"#475569",textTransform:"uppercase",marginTop:"0.2rem"}}>{l}</div></div>
      )}

    {result.hook&&<div style={{...S.card,marginBottom:"1rem",borderLeft:`3px solid ${result.hookStrength>=7?"#4ade80":result.hookStrength>=5?"#facc15":"#ef4444"}`}}><div style={{...S.label,marginBottom:"0.5rem"}}>Hook</div><p style={{...S.serif,fontSize:"0.82rem",color:"#94a3b8",margin:0,lineHeight:1.6}}>{result.hook}</p></div>}

    {result.sagPoints?.length>0&&<div style={{marginBottom:"1rem"}}><div style={{...S.label,marginBottom:"0.6rem",color:"#f59e0b"}}>⚠ Where Tension Sags</div>{result.sagPoints.map((s,i)=><div key={i} style={{background:"#0f172a",borderLeft:"3px solid #f59e0b",borderRadius:"4px",padding:"0.75rem 1rem",marginBottom:"0.5rem"}}><p style={{...S.serif,fontSize:"0.82rem",color:"#94a3b8",margin:0,lineHeight:1.6}}>{s}</p></div>)}</div>}
    {result.ending&&<div style={{...S.card,marginBottom:"1rem",borderLeft:`3px solid ${result.endingStrength>=7?"#4ade80":result.endingStrength>=5?"#facc15":"#ef4444"}`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"0.5rem"}}><div style={S.label}>Ending</div><span style={{fontFamily:"Georgia,serif",color:result.endingStrength>=7?"#4ade80":result.endingStrength>=5?"#facc15":"#ef4444",fontWeight:700}}>{result.endingStrength}/10</span></div><p style={{...S.serif,fontSize:"0.82rem",color:"#94a3b8",margin:0,lineHeight:1.6}}>{result.ending}</p></div>}
    {result.recommendations?.length>0&&<div style={{...S.card,marginBottom:"1rem"}}><div style={{...S.label,marginBottom:"0.75rem"}}>Recommendations</div>{result.recommendations.map((r,i)=><div key={i} style={{display:"flex",gap:"0.6rem",marginBottom:"0.6rem",paddingBottom:"0.6rem",borderBottom:i<result.recommendations.length-1?"1px solid #1e293b":"none"}}><span style={{color:"#8b5cf6",fontSize:"0.9rem"}}>→</span><p style={{...S.serif,fontSize:"0.82rem",color:"#94a3b8",margin:0,lineHeight:1.6}}>{r}</p></div>)}</div>}

function ExportTab({wordCount,aiisms,pacing,repeats,showTell,dialogue,tension,fileName}){
  const[exporting,setExporting]=React.useState(false),[done,setDone]=React.useState(false),[err,setErr]=React.useState(null);
  const checks=[
    {label:"AI-isms",ready:!!aiisms,api:true,note:aiisms?`Score ${aiisms.score}/10 · ${aiisms.flags?.length||0} flags`:"Run AI-isms tab"},
    {label:"Pacing & Starters",ready:!!pacing,api:false,note:pacing?`${pacing.total} sentences`:"Paste text"},
    {label:"Repeats",ready:!!repeats,api:false,note:repeats?`${repeats.crutchHits.length} crutch words`:"Paste text"},
    {label:"Show vs Tell",ready:!!showTell,api:true,note:showTell?`${showTell.ratio}% shown`:"Run Show vs Tell"},
    {label:"Dialogue",ready:!!dialogue,api:true,note:dialogue?`${dialogue.dialogueRatio}% dialogue`:"Run Dialogue tab"},
    {label:"Tension",ready:!!tension,api:true,note:tension?`Score ${tension.tensionScore}/10`:"Run Tension tab"},
  ];
  const readyCount=checks.filter(c=>c.ready).length;
  async function doExport(){setExporting(true);setDone(false);setErr(null);try{const sourceName=fileName?fileName.replace(/\.docx$/i,''):null;await exportDocx({wordCount,aiisms,pacing,repeats,showTell,dialogue,tension,sourceName});setDone(true);}catch(e){setErr(e.message);}setExporting(false);}
  if(wordCount<50)return<Empty msg="Paste text to enable export"/>;
  return<div>
    <div style={{...S.card,marginBottom:"1rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"0.75rem"}}><div style={S.label}>Analysis Status</div><span style={{...S.mono,fontSize:"0.65rem",color:readyCount===6?"#4ade80":"#64748b"}}>{readyCount}/6</span></div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.4rem"}}>
        {checks.map(c=><div key={c.label} style={{display:"flex",alignItems:"flex-start",gap:"0.75rem",padding:"0.55rem 0.75rem",background:"#0f172a",borderRadius:"4px",border:`1px solid ${c.ready?"#166534":"#1e293b"}`}}>
          <span style={{fontSize:"0.85rem",color:c.ready?"#4ade80":"#334155"}}>{c.ready?"✓":"○"}</span>
          <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:"0.4rem"}}><span style={{...S.mono,fontSize:"0.66rem",color:c.ready?"#f1f5f9":"#475569"}}>{c.label}</span>{c.api&&<span style={{...S.mono,fontSize:"0.48rem",color:"#334155"}}>◆</span>}</div><span style={{...S.mono,fontSize:"0.58rem",color:c.ready?"#4ade80":"#475569"}}>{c.note}</span></div>
        </div>)}
      </div>
    </div>
    <button onClick={doExport} disabled={exporting||readyCount===0} style={{width:"100%",padding:"1rem",background:exporting?"#1e293b":readyCount===0?"#0f172a":"#4ade80",border:"none",borderRadius:"4px",cursor:exporting||readyCount===0?"not-allowed":"pointer",...S.mono,fontSize:"0.78rem",letterSpacing:"0.15em",textTransform:"uppercase",color:exporting?"#475569":readyCount===0?"#334155":"#0a1628",fontWeight:700}}>
      {exporting?"◆ Building...":done?"✓ Downloaded":"⬇ Download .docx Report"}
    </button>
    {err&&<p style={{...S.mono,fontSize:"0.7rem",color:"#ef4444",marginTop:"0.6rem"}}>{err}</p>}
    {done&&<p style={{...S.mono,fontSize:"0.68rem",color:"#4ade80",marginTop:"0.6rem",textAlign:"center"}}>Saved to downloads.</p>}
  </div>;
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

function App(){
  const[text,setText]=React.useState('');
  const[tab,setTab]=React.useState('aiisms');
  const[fileName,setFileName]=React.useState('');
  const[aiisms,setAiisms]=React.useState(null);
  const[showTell,setShowTell]=React.useState(null);
  const[dialogue,setDialogue]=React.useState(null);
  const[tension,setTension]=React.useState(null);
  const[showSettings,setShowSettings]=React.useState(!getKey());

  const wordCount=React.useMemo(()=>countWords(text),[text]);
  const pacing=React.useMemo(()=>computePacing(text,wordCount),[text,wordCount]);
  const repeats=React.useMemo(()=>computeRepeats(text,wordCount),[text,wordCount]);
  const dialogueMeta=React.useMemo(()=>computeDialogueMeta(text,wordCount),[text,wordCount]);

  const handleTextChange=t=>{setText(t);if(Math.abs(countWords(t)-wordCount)>20){setAiisms(null);setShowTell(null);setDialogue(null);setTension(null);}};
  const onNoKey=()=>setShowSettings(true);

  return(
    <div style={{minHeight:"100vh",background:"#020817",color:"#e2e8f0",padding:"2rem 1.5rem",boxSizing:"border-box",fontFamily:"Georgia,serif"}}>
      {showSettings&&<SettingsScreen onSave={()=>setShowSettings(false)} onClose={()=>setShowSettings(false)} hasKey={!!getKey()}/>}
      <div style={{maxWidth:"780px",margin:"0 auto",position:"relative"}}>
        <div style={{marginBottom:"1.5rem",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{...S.mono,fontSize:"0.65rem",color:"#ef4444",letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:"0.5rem"}}>◆ Editorial Analysis Suite · v2</div>
            <h1 style={{fontFamily:"Georgia,serif",fontSize:"clamp(1.8rem,5vw,2.6rem)",fontWeight:700,margin:"0 0 0.4rem 0",lineHeight:1.1,color:"#f1f5f9"}}>The Red Pen</h1>
            <p style={{...S.mono,fontSize:"0.7rem",color:"#475569",margin:0}}>AI-isms · Pacing · Repeats · Show vs Tell · Dialogue · Tension</p>
          </div>
          <button onClick={()=>setShowSettings(true)} title="API Settings" style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:"4px",padding:"0.5rem 0.75rem",cursor:"pointer",...S.mono,fontSize:"0.65rem",color:"#475569",marginTop:"0.5rem"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#334155";e.currentTarget.style.color="#94a3b8";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#1e293b";e.currentTarget.style.color="#475569";}}>⚙ API</button>
        </div>
        <TextInput text={text} setText={handleTextChange} wordCount={wordCount} fileName={fileName} setFileName={setFileName}/>
        <TabBar active={tab} onChange={setTab}/>
        {tab==="aiisms"   &&<AIismsTab   text={text} wordCount={wordCount} result={aiisms}   setResult={setAiisms}   onNoKey={onNoKey}/>}
        {tab==="pacing"   &&<PacingTab   pacing={pacing}/>}
        {tab==="repeats"  &&<RepeatsTab  repeats={repeats}/>}
        {tab==="show-tell"&&<ShowTellTab text={text} wordCount={wordCount} result={showTell} setResult={setShowTell} onNoKey={onNoKey}/>}
        {tab==="dialogue" &&<DialogueTab text={text} wordCount={wordCount} result={dialogue} setResult={setDialogue} dialogueMeta={dialogueMeta} onNoKey={onNoKey}/>}
        {tab==="tension"  &&<TensionTab  text={text} wordCount={wordCount} result={tension}  setResult={setTension}  onNoKey={onNoKey}/>}
        {tab==="export"   &&<ExportTab   wordCount={wordCount} aiisms={aiisms} pacing={pacing} repeats={repeats} showTell={showTell} dialogue={dialogue} tension={tension} fileName={fileName}/>}
        <div style={{marginTop:"3rem",paddingTop:"1rem",borderTop:"1px solid #0f172a",textAlign:"center"}}>
          <p style={{...S.mono,fontSize:"0.55rem",color:"#1e293b",letterSpacing:"0.1em"}}>Signal9 Studio · The Red Pen v2 · ◆ = uses Anthropic API</p>
        </div>
      </div>
    </div>
  );
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// Register service worker
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
  </script>
</body>
</html>
